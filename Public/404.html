<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeCraft Redirect</title>
    <script>
      var repoName = "/CodeCraft";
      var path = window.location.pathname;
      var route = path.indexOf(repoName) === 0 ? path.slice(repoName.length) : "/";
      var target = repoName + "/#/" + route.replace(/^\/+/, "");

      if (window.location.search) {
        target += window.location.search;
      }

      window.location.replace(target);
    </script>
  </head>
  <body>
    Redirecting to CodeCraft Solutions...
  </body>
</html>
