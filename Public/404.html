<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeCraft Redirect</title>
    <script>
      var repoName = "/CodeCraft";
      var path = window.location.pathname;
      var route = path.indexOf(repoName) === 0 ? path.slice(repoName.length) : "/";

      if (window.location.search) {
        route += window.location.search;
      }

      if (window.location.hash) {
        route += window.location.hash;
      }

      window.sessionStorage.setItem("codecraft-route", route || "/");
      window.location.replace(repoName + "/");
    </script>
  </head>
  <body>
    Redirecting to CodeCraft Solutions...
  </body>
</html>
